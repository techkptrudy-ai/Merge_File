<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Radio Player</title>
    <style>
        :root {
            --accent: #10b981;
            --bg: #0f172a;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            margin: 20px 0;
        }
        .controls button {
            background: var(--accent);
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }
        .controls button:disabled { background: #475569; cursor: not-allowed; }
        .status { margin-top: 15px; font-size: 0.8rem; color: #94a3b8; }
        .error-msg { color: #f87171; font-size: 0.8rem; margin-top: 10px; display: none; }
        
        /* Animasi Loading */
        .loader {
            display: none;
            margin: 10px auto;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">Radio Online</h2>
    <div id="loader" class="loader"></div>
    <div id="status" class="status">Pilih saluran untuk memulai</div>
    <div id="error" class="error-msg">Gagal memuat streaming (Cek koneksi/Link mati)</div>

    <select id="station">
        <option value="">-- Pilih Stasiun --</option>
        <option value="https://jakarta.p3radio.com/genfm">Gen FM Jakarta</option>
        <option value="https://jakarta.p3radio.com/jakfm">Jak FM</option>
        <option value="https://cp1.idhost.asia:8000/live">Radio Rodja (Live)</option>
        <option value="https://sonicpanel.mbsfm.id/8026/stream">MBS FM</option>
    </select>

    <div class="controls">
        <button id="playBtn" onclick="togglePlay()">▶</button>
    </div>

    <div style="margin-top: 20px;">
        <input type="range" min="0" max="1" step="0.1" value="0.7" oninput="setVol(this.value)" style="width: 80%;">
    </div>
</div>

<script>
    const audio = new Audio();
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');
    const error = document.getElementById('error');
    const stationSelect = document.getElementById('station');

    function togglePlay() {
        const url = stationSelect.value;
        if (!url) { alert("Pilih radio dulu!"); return; }

        if (audio.paused) {
            if (audio.src !== url) {
                audio.src = url;
                audio.load();
            }
            startAudio();
        } else {
            audio.pause();
            playBtn.innerText = "▶";
            status.innerText = "Berhenti";
        }
    }

    function startAudio() {
        error.style.display = "none";
        loader.style.display = "block";
        status.innerText = "Menghubungkan...";
        
        audio.play().then(() => {
            playBtn.innerText = "⏸";
            status.innerText = "Sedang Memutar (Live)";
            loader.style.display = "none";
        }).catch(e => {
            console.error(e);
            loader.style.display = "none";
            error.style.display = "block";
            status.innerText = "Gagal";
        });
    }

    function setVol(val) { audio.volume = val; }

    // Jika user ganti pilihan di tengah jalan
    stationSelect.onchange = () => {
        audio.pause();
        playBtn.innerText = "▶";
        status.innerText = "Siap memutar " + stationSelect.options[stationSelect.selectedIndex].text;
    };

    // Deteksi otomatis jika stream terputus
    audio.onwaiting = () => { loader.style.display = "block"; status.innerText = "Buffering..."; };
    audio.onplaying = () => { loader.style.display = "none"; status.innerText = "Live"; };
</script>

</body>
</html>
